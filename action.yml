name: 'Veriva Code Scan'
description: 'Analyze pull request diffs for AI-generated code issues, security vulnerabilities, and code quality problems.'
author: 'Veriva'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  sarif-file:
    description: 'Path to write SARIF output file'
    required: false
    default: 'veriva-results.sarif'
  upload-sarif:
    description: 'Whether to upload SARIF to GitHub Code Scanning'
    required: false
    default: 'true'
  fail-on-critical:
    description: 'Fail the action if CRITICAL or HIGH findings are detected'
    required: false
    default: 'false'
  min-score:
    description: 'Minimum trust score (0-100). Action fails if score is below this threshold.'
    required: false
    default: '0'
  github-token:
    description: 'Token used to upload SARIF to GitHub Code Scanning. Defaults to the workflow-injected `github.token`, which carries the `security-events: write` permission already declared by the consuming workflow. Override only if you need a PAT (e.g. uploading a SARIF for a different repo).'
    required: false
    default: ${{ github.token }}

outputs:
  trust-score:
    description: 'Trust score (0-100)'
  grade:
    description: 'Letter grade (A-F)'
  findings-count:
    description: 'Total number of findings'
  critical-count:
    description: 'Number of CRITICAL/HIGH findings'
  sarif-file:
    description: 'Path to the SARIF output file'

runs:
  # node24: GitHub will force Node 24 for JS actions on 2026-06-02 and remove
  # Node 20 on 2026-09-16 (deprecation notice surfaced in workflow logs).
  # Bumped early so customers don't see a deprecation banner from us.
  using: 'node24'
  main: 'dist/index.js'
